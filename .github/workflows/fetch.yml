name: Scheduled data fetch

on:
  schedule:
    # Weekdays only. Cron runs in UTC. Every 2h across the global trading day
    # keeps the board near-live (fetch upserts provisional intraday prices);
    # the 21:30 anchor lands the official US closes.
    # Budget: ~10 runs/day x ~3 min x 22 days ~= 660 Actions-minutes/month.
    - cron: "15 4,6,8,10,12,14,16,18,20 * * 1-5"
    - cron: "30 21 * * 1-5"   # post-US-close anchor
  workflow_dispatch: {}

# Least-privilege: only this job needs write to push data back.
permissions:
  contents: write

# Never run two fetches on top of each other — the second would rebase on a
# moving target.
concurrency:
  group: fetch-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # The default GITHUB_TOKEN has write access here (via `permissions`
          # above) and can push back to the repo.
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Update universe from news
        # headlines pull + entity extraction + symbol resolution + universe
        # state update. ANTHROPIC_API_KEY is OPTIONAL — when the secret is
        # absent/empty the LLM extraction tier is skipped and the heuristic
        # tier carries the run. Feed/lookup failures are absorbed internally.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python update_universe.py

      - name: Run fetch
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python fetch.py

      - name: Regenerate digest
        # digest reads the freshly-fetched CSV + RSS; the FRED key is no longer
        # needed here (settings.get_fred_key is lazy and only fetch calls it).
        # RSS failures are handled inside digest.py.
        run: python digest.py

      - name: Overnight research pass
        # relations + analogues + research bundles + theses, all precomputed
        # so the board is zero-work at open. FREE LLM endpoints only: set
        # GROQ_API_KEY (free tier) or OPENROUTER_API_KEY (:free models) to
        # enable prose theses; with neither, the rule-based skeleton renders.
        # Fail-soft: any stage failing still lets the run commit the rest.
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python overnight.py

      - name: Board brief (LLM-ready state file, optional gist mirror)
        # one markdown file with the whole board state, for feeding Claude
        # conversations. GIST_TOKEN/GIST_ID optional: mirrors the brief to a
        # stable gist raw URL so external chats can auto-fetch the live board.
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: python brief.py

      - name: Commit and push updated data
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/prices.csv data/fetch_log.json data/digest_latest.txt \
                  data/universe.json data/headlines.json data/resolution_cache.json \
                  data/relations.json data/research_bundles.json data/theses.json \
                  data/pattern_cache.json data/articles data/board_brief.md \
                  data/squawk.json data/squawk.json

          # Nothing staged → no commit, no push, clean exit.
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit."
            exit 0
          fi

          # [skip ci] belt-and-suspenders: this workflow only listens to
          # schedule + workflow_dispatch, so it cannot self-trigger from a
          # push anyway, but the marker protects any future push-triggered
          # workflow from being re-fired by our own bot commit.
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          git commit -m "data: scheduled fetch + digest ${TS} [skip ci]"
          git push
