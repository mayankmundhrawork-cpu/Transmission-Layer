# Transmission Layer — terminal theme.
# Near-black background, off-white text, one restrained structural accent
# (steel blue). Red/amber are NOT set here — they are reserved exclusively for
# flag rendering in app.py, so a flag is always the loudest thing on screen.

[theme]
base = "dark"
backgroundColor = "#0b0d10"          # near-black canvas
secondaryBackgroundColor = "#14171c" # panels / cards
textColor = "#d8dde3"                # off-white primary text
primaryColor = "#5a7ea6"             # structural accent (links, focus) — muted steel

[client]
toolbarMode = "minimal"
