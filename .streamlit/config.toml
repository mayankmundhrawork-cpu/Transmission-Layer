# Transmission Layer — terminal theme tokens (mirrors app.py TOKENS).
# Near-true-black, mono everywhere, one steel accent. Red/amber are NOT set
# here — reserved exclusively for flag rendering in app.py.

[theme]
base = "dark"
backgroundColor = "#060708"          # bg0 — page
secondaryBackgroundColor = "#0d0f11" # bg1 — inputs / code blocks
textColor = "#f2f4f6"                # g1 — primary text
primaryColor = "#7d9cba"             # accent — structural only
font = "monospace"

[client]
toolbarMode = "minimal"
